name: GitForge CI
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend-main/package-lock.json
            frontend-main/package-lock.json
      - name: Lint Backend
        working-directory: backend-main
        run: npm ci && npm run lint
      - name: Lint Frontend
        working-directory: frontend-main
        run: npm ci && npm run lint

  test-backend:
    runs-on: ubuntu-latest
    needs: lint
    services:
      mongodb:
        image: mongo:7
        ports: [27017:27017]
    env:
      MONGODB_URI: mongodb://localhost:27017/gitforge-test
      JWT_SECRET_KEY: test-secret-key-that-is-at-least-32-chars-long
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend-main/package-lock.json
      - name: Install & Test
        working-directory: backend-main
        run: |
          npm ci
          npm test -- --coverage --forceExit
      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend-main/coverage

  test-frontend:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend-main/package-lock.json
      - name: Install & Test
        working-directory: frontend-main
        run: |
          npm ci
          npm test -- --coverage
      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend-main/coverage

  build:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build Frontend
        working-directory: frontend-main
        run: npm ci && npm run build
      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend-main/dist

  docker:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker Images
        run: docker compose build
      - name: Verify containers start
        run: |
          docker compose up -d
          sleep 10
          docker compose ps
          docker compose down

  security:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Run npm audit (backend)
        working-directory: backend-main
        run: npm audit --audit-level=high || true
      - name: Run npm audit (frontend)
        working-directory: frontend-main
        run: npm audit --audit-level=high || true
