<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- Decorative grid dots -->
  <g opacity="0.08" fill="white">
    <circle cx="50" cy="50" r="1.5"/><circle cx="90" cy="50" r="1.5"/><circle cx="130" cy="50" r="1.5"/><circle cx="170" cy="50" r="1.5"/><circle cx="210" cy="50" r="1.5"/>
    <circle cx="50" cy="90" r="1.5"/><circle cx="90" cy="90" r="1.5"/><circle cx="130" cy="90" r="1.5"/><circle cx="170" cy="90" r="1.5"/><circle cx="210" cy="90" r="1.5"/>
    <circle cx="50" cy="130" r="1.5"/><circle cx="90" cy="130" r="1.5"/><circle cx="130" cy="130" r="1.5"/><circle cx="170" cy="130" r="1.5"/><circle cx="210" cy="130" r="1.5"/>
    <circle cx="50" cy="170" r="1.5"/><circle cx="90" cy="170" r="1.5"/><circle cx="130" cy="170" r="1.5"/><circle cx="170" cy="170" r="1.5"/><circle cx="210" cy="170" r="1.5"/>
    <circle cx="50" cy="210" r="1.5"/><circle cx="90" cy="210" r="1.5"/><circle cx="130" cy="210" r="1.5"/><circle cx="170" cy="210" r="1.5"/><circle cx="210" cy="210" r="1.5"/>
    <circle cx="50" cy="250" r="1.5"/><circle cx="90" cy="250" r="1.5"/><circle cx="130" cy="250" r="1.5"/><circle cx="170" cy="250" r="1.5"/><circle cx="210" cy="250" r="1.5"/>
    <circle cx="990" cy="50" r="1.5"/><circle cx="1030" cy="50" r="1.5"/><circle cx="1070" cy="50" r="1.5"/><circle cx="1110" cy="50" r="1.5"/><circle cx="1150" cy="50" r="1.5"/>
    <circle cx="990" cy="90" r="1.5"/><circle cx="1030" cy="90" r="1.5"/><circle cx="1070" cy="90" r="1.5"/><circle cx="1110" cy="90" r="1.5"/><circle cx="1150" cy="90" r="1.5"/>
    <circle cx="990" cy="130" r="1.5"/><circle cx="1030" cy="130" r="1.5"/><circle cx="1070" cy="130" r="1.5"/><circle cx="1110" cy="130" r="1.5"/><circle cx="1150" cy="130" r="1.5"/>
    <circle cx="990" cy="170" r="1.5"/><circle cx="1030" cy="170" r="1.5"/><circle cx="1070" cy="170" r="1.5"/><circle cx="1110" cy="170" r="1.5"/><circle cx="1150" cy="170" r="1.5"/>
    <circle cx="990" cy="210" r="1.5"/><circle cx="1030" cy="210" r="1.5"/><circle cx="1070" cy="210" r="1.5"/><circle cx="1110" cy="210" r="1.5"/><circle cx="1150" cy="210" r="1.5"/>
    <circle cx="990" cy="250" r="1.5"/><circle cx="1030" cy="250" r="1.5"/><circle cx="1070" cy="250" r="1.5"/><circle cx="1110" cy="250" r="1.5"/><circle cx="1150" cy="250" r="1.5"/>
  </g>

  <!-- Glow orbs -->
  <circle cx="350" cy="150" r="180" fill="#7c3aed" opacity="0.06"/>
  <circle cx="850" cy="150" r="150" fill="#7c3aed" opacity="0.04"/>

  <!-- Logo -->
  <g transform="translate(420, 95)">
    <rect width="56" height="56" rx="14" fill="#7c3aed"/>
    <path d="M17 10 C17 10 17 28 17 30 C17 36 22 38 28 38 C34 38 39 36 39 30 C39 28 39 10 39 10" stroke="white" stroke-width="5" stroke-linecap="round" fill="none"/>
    <path d="M28 38 L28 46" stroke="white" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- Title -->
  <text x="496" y="138" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="42" font-weight="800" fill="white" letter-spacing="-1">GitForge</text>

  <!-- Tagline -->
  <text x="498" y="168" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="14" fill="#8a8a9a" letter-spacing="0.5">Distributed Version Control &amp; Automation Platform</text>

  <!-- Bottom accent line -->
  <rect x="350" y="200" width="500" height="2" rx="1" fill="url(#accent)" opacity="0.4"/>

  <!-- Feature pills -->
  <g font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="600">
    <rect x="350" y="220" width="80" height="24" rx="12" fill="#7c3aed" opacity="0.15"/>
    <text x="369" y="236" fill="#a78bfa">30+ CLI</text>

    <rect x="442" y="220" width="100" height="24" rx="12" fill="#7c3aed" opacity="0.15"/>
    <text x="456" y="236" fill="#a78bfa">Pull Requests</text>

    <rect x="554" y="220" width="72" height="24" rx="12" fill="#7c3aed" opacity="0.15"/>
    <text x="566" y="236" fill="#a78bfa">Snippets</text>

    <rect x="638" y="220" width="82" height="24" rx="12" fill="#7c3aed" opacity="0.15"/>
    <text x="651" y="236" fill="#a78bfa">Webhooks</text>

    <rect x="732" y="220" width="78" height="24" rx="12" fill="#7c3aed" opacity="0.15"/>
    <text x="745" y="236" fill="#a78bfa">Real-time</text>
  </g>

  <!-- Top & bottom border lines -->
  <rect x="0" y="0" width="1200" height="1" fill="#7c3aed" opacity="0.3"/>
  <rect x="0" y="299" width="1200" height="1" fill="#7c3aed" opacity="0.3"/>
</svg>
